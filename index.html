<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TCS NQT Prep</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <rect x="2" y="3" width="20" height="18" rx="2" stroke="#00d4ff" stroke-width="1.5"/>
      <path d="M8 8L4 12L8 16M16 8L20 12L16 16" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M10 16L14 8" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    NQT Prep
    <span class="logo-tag">PYTHON</span>
  </div>
  <div class="hstats">
    <div class="hbadge" id="hstat-solved">Solved <b>0/0</b></div>
    <div class="hbadge">TCS NQT <b>2026</b></div>
  </div>
</header>

<!-- SIDEBAR -->
<aside id="sidebar"></aside>

<!-- MAIN: question panel + code panel -->
<main>
  <div id="q-panel"></div>
  <div id="code-panel"></div>
</main>

<!--
  SCRIPT LOAD ORDER (important):
  1. Each question file   — defines Q_ARRAYS_1, Q_ARRAYS_2 ...
  2. Topic index file     — defines TOPIC_ARRAYS using those constants
  3. Registry             — defines ALL_TOPICS / ALL_QUESTIONS
  4. App                  — runs the UI
-->

<!-- Arrays questions -->
<script src="questions/arrays/q1-move-zeroes.js"></script>
<script src="questions/arrays/q02-second-largest-element.js"></script>

<script src="questions/arrays/q08-best-time-to-buy-and-sell-stock.js"></script>
<script src="questions/arrays/q09-majority-element.js"></script>
<script src="questions/arrays/q10-remove-duplicates-from-sorted-array.js"></script>
<script src="questions/arrays/q11-leaders-in-array.js"></script>
<script src="questions/arrays/q12-rearrange-array-alternately.js"></script>

<script src="questions/registry.js"></script>

</body>
</html>
